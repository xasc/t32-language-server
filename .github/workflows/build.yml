name: Build & test language server

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test_t32ls:
    name: Build and test OS binary
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build language server
        run: cargo build --verbose --bin t32ls

      - name: Run tests
        run: cargo test --verbose --package t32-language-server

  build_t32_ls_wasm:
    name: Build WebAssembly binary
    runs-on: ubuntu-latest
    env:
      WASI_VERSION: 32
      WASI_OS: linux
      WASI_ARCH: x86_64
    steps:
      - name: Set up repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install WebAssembly cross-compiler
        run: rustup target add wasm32-wasip1-threads

      - name: Update environment variables
        run: |
          echo "WASI_VERSION_FULL=${{ env.WASI_VERSION }}.0" >> $GITHUB_ENV
          echo "WASI_SDK=wasi-sdk-$WASI_VERSION_FULL-${{ env.WASI_ARCH }}-${{ env.WASI_OS }}" >> $GITHUB_ENV
          echo "WASI_RUSTFLAGS=-L $WASI_SDK/share/wasi-sysroot/lib/wasm32-wasip1-threads" >> $GITHUB_ENV
          echo "WASI_CC=$WASI_SDK/bin/clang" >> $GITHUB_ENV

      - name: Install WASI SDK
        run: |
          wget https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${{ env.WASI_VERSION }}/$WASI_SDK.tar.gz
          tar xvf $WASI_SDK.tar.gz

      - name: Build language server
        run: RUSTFLAGS="$WASI_RUSTFLAGS" CC="$WASI_CC" CFLAGS="${{ env.WASI_CFLAGS }}" cargo build --target=wasm32-wasip1-threads
        env:
          WASI_CFLAGS: -Wno-implicit-function-declaration

  latest_deps_t32ls:
    name: Check compatibility with dependencies
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS: allow
    steps:
      - name: Set up repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Upgrade dependencies
        run: cargo update --verbose

      - name: Build language server
        run: cargo build --verbose --bin t32ls

      - name: Run tests
        run: cargo test --verbose --package t32-language-server

  msrv:
    name: Check Rust version
    runs-on: ubuntu-latest
    steps:
      - name: Set up repository
        uses: actions/checkout@v6

      - name: Install cargo-hack
        uses: taiki-e/install-action@cargo-hack

      - name: Validate minimum Rust version
        run: cargo hack check --rust-version --workspace --all-targets --ignore-private
