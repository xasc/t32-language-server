name: Build language server for OS

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      profile:
        required: true
        type: string

jobs:
  build_and_test:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Set up repository
        uses: actions/checkout@v6

      - name: Build binary
        uses: ./.github/actions/build_steps_os
        with:
          profile: release

      - name: Run tests
        run: cargo test --verbose --package t32-language-server
