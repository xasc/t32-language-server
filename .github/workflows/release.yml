name: Create binary release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release_t32ls_bin_unix:
    name: Create Unix release
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build language server
        run: cargo build --verbose --bin t32ls --profile=release

      - name: Dump target dir
        run: echo $(realpath target/release) && ls -l target/release

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            ./target/release/t32ls

  release_t32ls_bin_win:
    name: Create Windows release
    runs-on: windows-latest
    steps:
      - name: Set up repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build language server
        run: cargo build --verbose --bin t32ls --profile=release

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            ./target/release/t32ls.exe
