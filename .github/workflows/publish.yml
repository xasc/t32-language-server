name: Publish language server releases

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true


jobs:
  publish_t32ls:
    name: Publish language server crate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable
    steps:
      - name: Set up repository
        uses: actions/checkout@v6

      - name: Install Rust
        run: rustup update ${{ matrix.toolchain }} && rustup default ${{ matrix.toolchain }}

      - name: Build language server
        run: cargo build --verbose --bin t32ls

      - name: Run tests
        run: cargo test --verbose --bin t32ls

      - name: Publish crate dry run
        run: |
          cargo login
          cargo publish --dry-run --package t32-language-server
        env:
          CARGO_REGISTRY_TOKEN: ${{secrets.CARGO_TOKEN}}

      - name: Publish crate
        run: |
          cargo login
          cargo publish --package t32-language-server
        env:
          CARGO_REGISTRY_TOKEN: ${{secrets.CARGO_TOKEN}}
